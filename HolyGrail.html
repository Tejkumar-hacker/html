<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100vh;
            margin: 0;
        }
        .page{
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        header, footer{
            background-color: rgb(20, 6, 6);
            padding: 20px;
            text-align: center;
            color: white;
        }

        .content{
            display: flex;
            flex-direction: row;
            flex: 1;
            justify-content: space-between;
            align-items: center;
        }
        .content aside{
            background-color: rgb(91, 100, 104);
            padding: 20px;
            width: 100px;
            height:100vh;
            display: flex;
            flex-direction: column;
            text-align: center;
            justify-content: center;
        }
        .content main{
            background-color: rgb(207, 228, 207);
            padding: 20px;
            width: 100%;
            height:100vh;
            text-align: center;
                display: flex;
                justify-content: center;
                align-items: center;
        }
        
    </style>
</head>
<body>
    <div class="page">
        <header>Header</header>
        <div class="content">
            <aside>Left</aside>
            <main>Main</main>
            <aside>Right</aside>
        </div>

        <footer>Footer</footer>
    </div>
</body>
</html>
