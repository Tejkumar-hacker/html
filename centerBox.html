<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100vh;
            margin: 0;
        }

        .container{
            height: 100%;
            border: 2px dashed gray;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box{
            width: 120px;
            height: 120px;
            border: 2px dashed gray;
            background: steelblue;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;

        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">CENTER</div>
    </div>
</body>
</html>
