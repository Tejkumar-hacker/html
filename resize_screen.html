<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
   <div class="box">Resize Screen</div> 
   <style>
    .box{
        background: blue;
        color: white;
        padding: 20px;

        .box{
            background: red;
        }
    }
   </style>
