<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="circle">
        
    </div>
    <style>
        .circle{
            width: 50px;
            height: 50px;
            background: green;
            border-radius: 50%;
            animation: move 2s infinite;

        }

        @keyframes move {
            from {transform: translateY(0);}
            to {transform: translateY(100px);}  
        }
    </style>
</body>
</html>
