<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .nav{
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #333;
            padding: 10px;
            color: white;
        }
        .logo{
            font-size: 24px;
            font-weight: bold;
            justify-content: flex-start;
        }
        .menu{
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            flex-wrap: wrap;
            gap: 10px;
        }
        .menu div{
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }
        .menu div:hover{
            background-color: #555;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="nav">
        <div class="logo">Logo</div>
        <div class="menu">
            <div>Home</div>
            <div>About</div>
            <div>Contact</div>
        </div>
    </div>
</body>
</html>
