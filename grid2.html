<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="grid">
        <div>A</div>
        <div>B</div>
        <div>C</div>
        <div>D</div>
    </div>

    <style>
        .grid{
          display: grid;  
          grid-template-columns: 1fr 1fr;
          gap: 10px;
        }
        .grid div{
            background-color: orange;
            padding: 20px;
            text-align: center;
        }
    </style>
</body>
</html>
